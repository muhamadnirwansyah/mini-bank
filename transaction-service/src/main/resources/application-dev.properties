spring.datasource.url=jdbc:postgresql://localhost:5432/microservice_transaction
spring.datasource.username=microservice_transaction
spring.datasource.password=microservice_transaction
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
account-service.url=http://account-service
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
