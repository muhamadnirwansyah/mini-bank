server:
  port: 10000
spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/accounts/**
              filters:
                - StripPrefix=1
            - id: transaction-service
              uri: lb://transaction-service
              predicates:
                - Path=/transactions/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    id: transactionServiceCircuitBreaker
                    fallbackUri: forward:/fallback/transaction
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: "*"
springdoc:
  swagger-ui:
    urls:
      - name: account-service
        url: /accounts/v3/api-docs
      - name: transaction-service
        url: /transactions/v3/api-docs